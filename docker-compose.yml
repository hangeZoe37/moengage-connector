services:
  mysql:
    image: mysql:8.0
    container_name: sparc-db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: reset@123
    ports:
      - "3307:3306"
    volumes:
      - ./migrations:/docker-entrypoint-initdb.d
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-preset@123"]
      interval: 5s
      timeout: 10s
      retries: 10
      start_period: 30s

  moengage:
    build: ./moengage-microservice
    restart: always
    depends_on:
      mysql:
        condition: service_healthy
    ports:
      - "4000:4000"
    env_file: ./moengage-microservice/.env
    environment:
      - DB_HOST=mysql
    volumes:
      - ./moengage-microservice:/app
      - /app/node_modules
    command: nodemon server.js
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:4000/health"]
      interval: 10s
      timeout: 5s
      retries: 3

  clevertap:
    build: ./clevertap-microservice
    restart: always
    depends_on:
      mysql:
        condition: service_healthy
    ports:
      - "6001:6001"
    env_file: ./clevertap-microservice/.env
    environment:
      - DB_HOST=mysql
    volumes:
      - ./clevertap-microservice:/app
      - /app/node_modules
    command: nodemon server.js
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:6001/health"]
      interval: 10s
      timeout: 5s
      retries: 3

  webengage:
    build: ./webengage-microservice
    restart: always
    depends_on:
      mysql:
        condition: service_healthy
    ports:
      - "6000:6000"
    env_file: ./webengage-microservice/.env
    environment:
      - DB_HOST=mysql
    volumes:
      - ./webengage-microservice:/app
      - /app/node_modules
    command: nodemon server.js
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:6000/health"]
      interval: 10s
      timeout: 5s
      retries: 3

  dashboard-hub:
    build: ./sparc-dashboard-hub
    restart: always
    depends_on:
      mysql:
        condition: service_healthy
    ports:
      - "7001:7001"
      - "7000:7000"
    env_file: ./sparc-dashboard-hub/.env
    environment:
      - DB_HOST=mysql
    volumes:
      - ./sparc-dashboard-hub:/app
      - /app/node_modules
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:7001/health"]
      interval: 15s
      timeout: 5s
      retries: 3

volumes:
  mysql_data:
